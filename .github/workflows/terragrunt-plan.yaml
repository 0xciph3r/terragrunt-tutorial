name: Terragrunt Plan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terragrunt-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Install Terragrunt
        run: |
          TG_VERSION="$(curl -s https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest | grep -m1 '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')"
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - name: Terragrunt run-all Plan
        working-directory: live/dev/us-east-1/
        run: terragrunt run --all plan --non-interactive