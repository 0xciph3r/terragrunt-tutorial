name: Terragrunt Manual Plan

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Path to Terragrunt stack root"
        required: true
        default: "live/dev/us-east-1"
        type: string

jobs:
  terragrunt-manual-plan:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Install Terragrunt
        run: |
          TG_VERSION="$(curl -s https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest | grep -m1 '"tag_name":' | sed -E 's/.*\"([^\"]+)\".*/\1/')"
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Check AWS secrets are set
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }
          if [ -z "${AWS_DEFAULT_REGION}" ]; then
            echo "AWS_REGION secret is not set, defaulting to us-east-1"
            echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"
          fi

      - name: Terragrunt run-all plan
        working-directory: ${{ github.event.inputs.stack_path }}
        run: terragrunt run --all plan --non-interactive
